      where: PARAMCD='DOR' AND CNSR=0
      variable: AVAL
      derivation: n(%) where AVAL >= 6*30.4375
    - row: DoR >= 12 months, n (%)
      dataset: ADTTE
      where: PARAMCD='DOR' AND CNSR=0
      variable: AVAL
      derivation: n(%) where AVAL >= 12*30.4375
