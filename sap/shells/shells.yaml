  title: Duration of Response
  analysis_set: RESPONDERS
  source_datasets:
  - ADTTE
  parameter_codes:
  - DOR
  key_variables:
  - TRT01P
  - AVAL
  - CNSR
  methods:
  - M-KM-MEDIAN
  - M-KM-PROB
  sap_ref: §5.4
  reference_documents:
  - SAP-0.1
  layout:
    rows: Median DoR (95% CI); proportion with DoR ≥6 mo, ≥12 mo
    columns: TRT01P
  notes: No formal between-arm test (hypothesis-generating).
  annotations:
    population: 'ADSL: ITTFL=''Y'' + ADRS: EFFFL=''Y'' AND ANL01FL=''Y'' AND AVALC IN (''CR'',''PR'')  |  analysis by TRT01P'
    primary_dataset: ADTTE WHERE PARAMCD='DOR'
    rows:
    - row: Confirmed responders, n
      dataset: ADTTE
      where: PARAMCD='DOR'
      variable: USUBJID
      derivation: n() distinct
    - row: Median DoR (months)
      dataset: ADTTE
      where: PARAMCD='DOR'
      variable: AVAL
      derivation: survfit(Surv(AVAL,1-CNSR)~TRT01P) -> median / 30.4375
    - row: 95% CI (Brookmeyer-Crowley)
      dataset: ADTTE
      where: PARAMCD='DOR'
      variable: AVAL
      derivation: survfit(..., conf.type='log-log') -> lower/upper
    - row: DoR >= 6 months, n (%)
