- id: T-EFF-05
  kind: table
  title: Objective Response Rate (BICR)
  analysis_set: RESPEVAL
  source_datasets:
  - ADRS
  - ADSL
  parameter_codes:
  - CBOR
  key_variables:
  - TRT01P
  - AVALC
  - ORRFL
  - STRAT2
  - STRAT3
  methods:
  - M-CMH-STRAT
  - M-CLOPPER
  - M-WILSON
  sap_ref: §5.3
  reference_documents:
  - SAP-0.1
  layout:
    rows: N, n responders, ORR % (95% CI), risk difference (95% CI), CMH p; best response breakdown (CR/PR/SD/PD/NE)
    columns: TRT01P
  notes: Clopper-Pearson 95% CI primary; Wilson as sensitivity row. Subjects with no post-baseline assessment counted as non-responders
    (§4.3).
  annotations:
    population: 'ADSL: ITTFL=''Y'' + ADRS: EFFFL=''Y''  |  analysis by TRT01P'
    primary_dataset: ADRS WHERE PARAMCD='CBOR' + ADSL WHERE ITTFL='Y' AND EFFFL='Y'
    rows:
    - row: N (Response Evaluable)
      dataset: ADRS
      where: PARAMCD='CBOR' AND EFFFL='Y'
      variable: USUBJID
      derivation: n() distinct
    - row: Responders (confirmed CR+PR), n (%)
      dataset: ADRS
      where: PARAMCD='CBOR' AND ANL01FL='Y' AND AVALC IN ('CR','PR')
      variable: 'ORRFL  # study-specific'
      derivation: n(%) — ORRFL='Y'
    - row: 95% CI (Clopper-Pearson)
      dataset: ADRS
      where: PARAMCD='CBOR'
      variable: 'ORRFL  # study-specific'
      derivation: binom.test(x,n) -> conf.int
    - row: 95% CI (Wilson — sensitivity)
      dataset: ADRS
      where: PARAMCD='CBOR'
      variable: 'ORRFL  # study-specific'
      derivation: BinomCI(x,n,method='wilson')
    - row: Risk Difference (MH)
      dataset: ADRS
      where: PARAMCD='CBOR'
      variable: 'ORRFL  # study-specific'
      derivation: mantelhaen.test -> estimate
    - row: Stratified CMH p-value
      dataset: ADRS
      where: PARAMCD='CBOR'
      variable: 'ORRFL  # study-specific'
      derivation: mantelhaen.test -> p.value
    - row: BOR breakdown (CR/PR/SD/PD/NE)
