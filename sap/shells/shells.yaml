- id: F-EFF-01
  kind: figure
  title: Kaplan-Meier Curve — OS
  analysis_set: ITT
  source_datasets:
  - ADTTE
  parameter_codes:
  - OS
  key_variables:
  - TRT01P
  - AVAL
  - CNSR
  methods:
  - M-KM-MEDIAN
  sap_ref: §5.1
  reference_documents:
  - SAP-0.1
  layout:
    axes: x = time (months), y = survival probability (0–1)
    features: 95% CI bands (log-log); number-at-risk table at 0, 6, 12, 18, 24, 30, 36 months
    annotations: stratified log-rank p, HR (95% CI)
  notes: One curve per TRT01P.
  annotations:
    population: 'ADSL: ITTFL=''Y''  |  analysis by TRT01P'
    primary_dataset: ADTTE WHERE PARAMCD='OS'
    rows:
    - row: 'x-axis: time in months'
      dataset: ADTTE
      where: PARAMCD='OS'
      variable: AVAL
      derivation: AVAL / 30.4375
    - row: 'y-axis: survival probability'
      dataset: ADTTE
      where: PARAMCD='OS'
      variable: AVAL,CNSR
      derivation: survfit(Surv(AVAL,1-CNSR)~TRT01P+strata(STRAT2,STRAT3)) -> surv
    - row: 95% CI bands (shaded)
      dataset: ADTTE
      where: PARAMCD='OS'
      variable: AVAL,CNSR
      derivation: survfit(..., conf.type='log-log') -> lower/upper
    - row: Number-at-risk table
      dataset: ADTTE
      where: PARAMCD='OS'
      variable: AVAL
      derivation: summary(survfit, times=seq(0,36,6)*30.4375) -> n.risk per arm
    - row: HR + 95% CI annotation
      dataset: ADTTE
      where: PARAMCD='OS'
      variable: AVAL,CNSR
      derivation: coxph -> exp(coef) / confint
    - row: Stratified log-rank p annotation
      dataset: ADTTE
      where: PARAMCD='OS'
      variable: AVAL,CNSR
      derivation: survdiff -> p-value
    note: Preliminary v0.1 — based on AD*-spec.md; confirm after Phase 5 ADaM delivery.
