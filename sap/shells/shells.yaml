      dataset: ADSL
      where: ITTFL='Y'
      variable: SEX
      derivation: n(%)
    - row: Race, n (%)
      dataset: ADSL
      where: ITTFL='Y'
      variable: RACE
      derivation: n(%)
    - row: Ethnicity, n (%)
      dataset: ADSL
      where: ITTFL='Y'
      variable: ETHNIC
      derivation: n(%)
    - row: Region, n (%)
      dataset: ADSL
