- id: T-EFF-01
  kind: table
  title: Overall Survival Analysis (Primary)
  analysis_set: ITT
  source_datasets:
  - ADTTE
  parameter_codes:
  - OS
  key_variables:
  - TRT01P
  - AVAL
  - CNSR
  - STRAT2
  - STRAT3
  methods:
  - M-STRAT-LOGRANK
  - M-COX-STRAT
  - M-KM-MEDIAN
  sap_ref: §5.1
  reference_documents:
  - SAP-0.1
  - PROTO-1.1
  layout:
    rows: n, events, censored, median OS (95% CI), HR (95% CI), stratified log-rank p
    columns: TRT01P
  notes: 'Primary analysis. Triggered at ~320 OS events (event-driven, Protocol §8.1). Strata: histology (STRAT2), region
    (STRAT3).'
  annotations:
    population: 'ADSL: ITTFL=''Y''  |  analysis by TRT01P'
    primary_dataset: ADTTE WHERE PARAMCD='OS'
    rows:
    - row: Number of subjects
      dataset: ADTTE
      where: PARAMCD='OS'
      variable: USUBJID
      derivation: n() distinct
    - row: Events (deaths), n (%)
      dataset: ADTTE
      where: PARAMCD='OS' AND CNSR=0
      variable: CNSR
      derivation: sum(1-CNSR) / N
    - row: Censored, n (%)
      dataset: ADTTE
      where: PARAMCD='OS' AND CNSR=1
      variable: CNSR
      derivation: sum(CNSR) / N
    - row: Median OS (months)
      dataset: ADTTE
      where: PARAMCD='OS'
      variable: AVAL
      derivation: survfit(Surv(AVAL,1-CNSR)~TRT01P+strata(STRAT2,STRAT3)) -> median / 30.4375
    - row: 95% CI (Brookmeyer-Crowley)
      dataset: ADTTE
      where: PARAMCD='OS'
      variable: AVAL
      derivation: survfit(..., conf.type='log-log') -> lower/upper
    - row: Hazard Ratio (Cox stratified)
      dataset: ADTTE
      where: PARAMCD='OS'
      variable: AVAL,CNSR
      derivation: coxph(Surv(AVAL,1-CNSR)~TRT01P+strata(STRAT2,STRAT3)) -> exp(coef)
    - row: HR 95% CI
      dataset: ADTTE
      where: PARAMCD='OS'
      variable: AVAL,CNSR
      derivation: coxph(...) -> confint -> exp
    - row: Stratified log-rank p-value
      dataset: ADTTE
      where: PARAMCD='OS'
      variable: AVAL,CNSR
      derivation: survdiff(Surv(AVAL,1-CNSR)~TRT01P+strata(STRAT2,STRAT3), rho=0) -> p
    note: Preliminary v0.1 — based on AD*-spec.md; confirm after Phase 5 ADaM delivery.
