  - id: F-EFF-02
    kind: figure
    title: "Kaplan-Meier Curve — PFS"
    analysis_set: ITT
    source_datasets: [ADTTE]
    parameter_codes: [PFS]
    key_variables: [TRT01P, AVAL, CNSR]
