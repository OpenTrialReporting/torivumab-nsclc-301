  - id: T-AE-06
    kind: table
    title: "AESIs by Category"
    analysis_set: SAFETY
    source_datasets: [ADAE]
    parameter_codes: []
    key_variables: [TRT01A, AESI, AETOXGR]
    methods: [M-DESCR-CAT]
    sap_ref: "§5.5"
