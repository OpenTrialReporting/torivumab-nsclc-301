      columns: "TRT01P"
    notes: "Sensitivity — primary OS re-run on PP population."

  - id: T-EFF-09
    kind: table
    title: "OS Landmark Analysis"
    analysis_set: ITT
    source_datasets: [ADTTE]
    parameter_codes: [OS]
    key_variables: [TRT01P, AVAL, CNSR]
    methods: [M-LANDMARK]
    sap_ref: "§11"
    reference_documents: [SAP-0.1]
    layout:
      rows: "12 months, 24 months"
      columns: "TRT01P probability, difference (95% CI)"
    notes: "Difference in survival probability with 95% CI (log-log)."

  - id: T-EFF-10
    kind: table
    title: "Restricted Mean Survival Time (OS)"
