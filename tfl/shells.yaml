  - id: T-AE-07
    kind: table
    title: "Deaths"
    analysis_set: SAFETY
    source_datasets: [ADSL, ADAE]
    parameter_codes: []
    key_variables: [TRT01A, DTHFL, DTHDT, DTHCAUS, TRTEDT]
