  - id: F-EFF-05
    kind: figure
    title: "Forest — OS HR by Subgroup"
    analysis_set: ITT
    source_datasets: [ADSL, ADTTE]
    parameter_codes: [OS]
    key_variables: [TRT01P, AVAL, CNSR, HISTSCAT, REGION1, SEX, AGEGR1, BECOG, PDL1GR]
