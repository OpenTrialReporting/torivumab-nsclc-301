# =============================================================================
#  tfl/shells.yaml — SOURCE OF TRUTH for TFL shells (ARS-aligned schema)
# =============================================================================
#
#  DO NOT edit tfl/TFL-SHELLS.md directly. Edit this file, then run:
#
#      Rscript tfl/render_shells.R
#      Rscript tfl/validate_shells.R
#
#  Schema mirrors CDISC Analysis Results Standard (ARS) v1.0 concepts:
#    analysis_sets       → ARS AnalysisSet
#    data_subsets        → ARS DataSubset
#    methods             → ARS AnalysisMethod
#    reference_documents → ARS ReferenceDocument
#    outputs             → ARS Output (each with embedded Analysis reference)
# =============================================================================

meta:
  study: SIMULATED-TORIVUMAB-2026
  study_short: torivumab-nsclc-301
  sap_version: "0.1"
  protocol_version: "1.1"
  shells_version: "0.1"
  shells_date: "2026-04-20"
  author: "Lovemore Gakava"
  gate: "3.5"
  ars_alignment: "CDISC ARS v1.0 concepts (not yet serialised to ARS JSON)"

# -----------------------------------------------------------------------------
# Analysis sets (ARS AnalysisSet) — population filters
# -----------------------------------------------------------------------------
analysis_sets:
  - id: ITT
    label: "Intent-to-Treat"
    definition: "All randomised patients, analysed as randomised"
    adsl_filter: "ITTFL == 'Y'"
    treatment_var: TRT01P
    expected_n: 450

  - id: SAFETY
    label: "Safety"
    definition: "All patients who received ≥1 dose, analysed as treated"
    adsl_filter: "SAFFL == 'Y'"
    treatment_var: TRT01A
    expected_n: 450

  - id: PP
    label: "Per-Protocol"
    definition: "ITT ∩ SAFFL ∩ no major protocol deviations"
    adsl_filter: "PPROTFL == 'Y'"
    treatment_var: TRT01P
    expected_n: 405

  - id: RESPEVAL
    label: "Response Evaluable"
    definition: "ITT with ≥1 post-baseline tumour assessment OR clinical progression before first assessment"
    adsl_filter: "ITTFL == 'Y'"        # refined on ADRS via EFFFL
    adrs_filter: "EFFFL == 'Y'"
    treatment_var: TRT01P
    expected_n: 440

  - id: RESPONDERS
    label: "Confirmed Responders"
    definition: "Subset of Response Evaluable with confirmed BOR ∈ {CR, PR}"
    adsl_filter: "ITTFL == 'Y'"
    adrs_filter: "EFFFL == 'Y' & AVALC %in% c('CR','PR') & ANL01FL == 'Y'"
    treatment_var: TRT01P
    expected_n: null                    # data-dependent

# -----------------------------------------------------------------------------
# Statistical methods (ARS AnalysisMethod)
# -----------------------------------------------------------------------------
methods:
  - id: M-STRAT-LOGRANK
    name: "Stratified Log-Rank Test"
    description: "Two-sided stratified log-rank test of treatment equality in time-to-event."
    strata: [STRAT2, STRAT3]            # histology, region
    r_package: "survival"
    r_function: "survdiff(..., rho = 0)"

  - id: M-COX-STRAT
    name: "Stratified Cox Proportional Hazards"
    description: "Stratified Cox PH model to estimate HR and 95% CI."
    strata: [STRAT2, STRAT3]
    r_package: "survival"
    r_function: "coxph(Surv(AVAL,1-CNSR) ~ TRT01P + strata(STRAT2,STRAT3))"

  - id: M-KM-MEDIAN
    name: "Kaplan-Meier Median"
    description: "Median survival with 95% CI using Brookmeyer-Crowley (log-log)."
    r_package: "survival"
    r_function: "survfit(..., conf.type = 'log-log')"

  - id: M-KM-PROB
    name: "Kaplan-Meier Survival Probability"
    description: "Survival probability at specified timepoints with Greenwood 95% CI."
    r_package: "survival"
    r_function: "summary(survfit(...), times = t)"

  - id: M-CMH-STRAT
    name: "Stratified Cochran-Mantel-Haenszel"
    description: "Stratified MH test of proportion equality; MH risk difference + 95% CI."
    strata: [STRAT2, STRAT3]
    r_package: "stats"
    r_function: "mantelhaen.test(...)"

  - id: M-CLOPPER
    name: "Clopper-Pearson Exact 95% CI"
    description: "Exact binomial confidence interval for proportions."
    r_package: "stats"
    r_function: "binom.test(...)"

  - id: M-WILSON
    name: "Wilson Score 95% CI"
    description: "Wilson score interval for proportions — sensitivity for Clopper-Pearson."
    r_package: "DescTools"
    r_function: "BinomCI(..., method='wilson')"

  - id: M-RMST
    name: "Restricted Mean Survival Time"
    description: "RMST at τ = 36 months; RMST difference with 95% CI."
    r_package: "survRM2"
    r_function: "rmst2(..., tau = 36)"

  - id: M-LANDMARK
    name: "Landmark Survival Comparison"
    description: "Difference in KM survival probability at landmark timepoints with 95% CI (log-log)."
    r_package: "survival"
    r_function: "summary(survfit(...), times = c(12, 24))"

  - id: M-DESCR-CAT
    name: "Descriptive — Categorical"
    description: "n (%) of subjects per level."
    r_package: "rtables"

  - id: M-DESCR-CONT
    name: "Descriptive — Continuous"
    description: "n, mean (SD), median, min, max per group."
    r_package: "rtables"

  - id: M-EAIR
    name: "Exposure-Adjusted Incidence Rate"
    description: "Events per 100 patient-years (person-time = TRTDURD summed)."
    r_package: "tern"

  - id: M-KM-TTE-ONSET
    name: "Time-to-Onset / Resolution (KM)"
    description: "Kaplan-Meier for time to irAE onset or resolution."
    r_package: "survival"

  - id: M-FOREST-SUBGROUP
    name: "Subgroup Forest (Unstratified Cox)"
    description: "Per-subgroup unstratified Cox HR + 95% CI; overall stratified HR."
    r_package: "survival"
    r_function: "coxph per subgroup level"

  - id: M-SHIFT
    name: "Shift Table (Baseline → Worst Post-Baseline)"
    description: "Cross-tabulation of BNRIND × worst ANRIND."
    r_package: "rtables"

  - id: M-WATERFALL
    name: "Waterfall (Best % Change)"
    description: "Per-subject bar of best % change from baseline SLD, sorted descending."
    r_package: "ggplot2"

  - id: M-SPIDER
    name: "Spider (Longitudinal % Change)"
    description: "Per-subject line of % change from baseline SLD over time."
    r_package: "ggplot2"

  - id: M-SWIMMER
    name: "Swimmer Lane (Responders)"
    description: "Per-responder horizontal lane with response episodes, PD, death markers."
    r_package: "ggplot2"

# -----------------------------------------------------------------------------
# Reference documents (ARS ReferenceDocument)
# -----------------------------------------------------------------------------
reference_documents:
  - id: PROTO-1.1
    title: "Protocol v1.1"
    path: "protocol/synopsis.md"
  - id: SAP-0.1
    title: "Statistical Analysis Plan v0.1"
    path: "sap/SAP.md"
  - id: CRF-2.0
    title: "CRF Strategy v2.0"
    path: "crf/CRF-STRATEGY.md"

# -----------------------------------------------------------------------------
# Outputs (ARS Output + Analysis)
# -----------------------------------------------------------------------------
outputs:

  # ===== Disposition and demographics =====

  - id: T-DM-01
    kind: table
    title: "Demographic and Baseline Characteristics"
    analysis_set: ITT
    source_datasets: [ADSL]
    parameter_codes: []
    key_variables: [TRT01P, AGE, AGEGR1, SEX, RACE, ETHNIC, REGION1, HISTSCAT, BECOG, PDL1GR, STRAT1, STRAT2, STRAT3]
    methods: [M-DESCR-CAT, M-DESCR-CONT]
    sap_ref: "§3.1"
    reference_documents: [SAP-0.1, PROTO-1.1]
    layout:
      rows: "One row per baseline characteristic"
      columns: "TRT01P arms + Total (three columns)"
    notes: |
      Descriptive: n (%) for categorical; n, mean (SD), median, min, max for continuous.

  - id: T-DS-01
    kind: table
    title: "Subject Disposition"
    analysis_set: ITT
    source_datasets: [ADSL]
    parameter_codes: []
    key_variables: [ITTFL, SAFFL, PPROTFL, EFFFL, EOSSTT, DCSREAS, DTHFL, RFICDT, RANDDT, TRTSDT, TRTEDT, EOSDT]
    methods: [M-DESCR-CAT]
    sap_ref: "§3"
    reference_documents: [SAP-0.1]
    layout:
      rows: "Screened / Randomised / ITT / Safety / PP / Response Evaluable / Discontinued (by reason) / Completed / Ongoing / Died"
      columns: "TRT01P"
    notes: "Counts and percentages for each category."

  - id: T-DS-02
    kind: table
    title: "Major Protocol Deviations"
    analysis_set: ITT
    source_datasets: [ADSL, "SDTM.DS"]
    parameter_codes: []
    key_variables: [TRT01P, USUBJID]
    methods: [M-DESCR-CAT]
    sap_ref: "§3.2"
    reference_documents: [SAP-0.1]
    layout:
      rows: "Deviation category"
      columns: "TRT01P + Total"
    notes: "n (%) subjects with ≥1 major deviation by category. Source: SDTM.DS where DSDECOD='PROTOCOL DEVIATION' AND DSSCAT='MAJOR'."

  # ===== Exposure =====

  - id: T-EX-01
    kind: table
    title: "Study Drug Exposure"
    analysis_set: SAFETY
    source_datasets: [ADSL]
    parameter_codes: []
    key_variables: [TRT01A, TRTSDT, TRTEDT, TRTDURD, N_CYCLES, CUMDOSE]
    methods: [M-DESCR-CONT, M-DESCR-CAT]
    sap_ref: "§5.5"
    reference_documents: [SAP-0.1]
    layout:
      rows: "Median (min–max) treatment duration; mean (SD) cycles received; n (%) with ≥6/≥12/≥24 cycles; relative dose intensity"
      columns: "TRT01A"
    notes: |
      Exposure summaries computed from ADSL (TRTDURD, N_CYCLES, CUMDOSE) — no separate ADEX dataset in scope.

  # ===== Efficacy — primary and key secondary =====

  - id: T-EFF-01
    kind: table
    title: "Overall Survival Analysis (Primary)"
    analysis_set: ITT
    source_datasets: [ADTTE]
    parameter_codes: [OS]
    key_variables: [TRT01P, AVAL, CNSR, STRAT2, STRAT3]
    methods: [M-STRAT-LOGRANK, M-COX-STRAT, M-KM-MEDIAN]
    sap_ref: "§5.1"
    reference_documents: [SAP-0.1, PROTO-1.1]
    layout:
      rows: "n, events, censored, median OS (95% CI), HR (95% CI), stratified log-rank p"
      columns: "TRT01P"
    notes: "Primary analysis. Triggered at ~320 OS events (event-driven, Protocol §8.1). Strata: histology (STRAT2), region (STRAT3)."

  - id: T-EFF-02
    kind: table
    title: "Kaplan-Meier Survival Probabilities — OS"
    analysis_set: ITT
    source_datasets: [ADTTE]
    parameter_codes: [OS]
    key_variables: [TRT01P, AVAL, CNSR]
    methods: [M-KM-PROB]
    sap_ref: "§5.1"
    reference_documents: [SAP-0.1]
    layout:
      rows: "Timepoints 6, 12, 18, 24 months"
      columns: "TRT01P — probability, 95% CI"
    notes: "Greenwood 95% CI."

  - id: T-EFF-03
    kind: table
    title: "Progression-Free Survival Analysis (BICR)"
    analysis_set: ITT
    source_datasets: [ADTTE]
    parameter_codes: [PFS]
    key_variables: [TRT01P, AVAL, CNSR, STRAT2, STRAT3]
    methods: [M-STRAT-LOGRANK, M-COX-STRAT, M-KM-MEDIAN]
    sap_ref: "§5.2"
    reference_documents: [SAP-0.1]
    layout:
      rows: "n, events, censored, median PFS (95% CI), HR (95% CI), stratified log-rank p"
      columns: "TRT01P"
    notes: "Same structure as T-EFF-01 for PFS."

  - id: T-EFF-04
    kind: table
    title: "Kaplan-Meier Probabilities — PFS"
    analysis_set: ITT
    source_datasets: [ADTTE]
    parameter_codes: [PFS]
    key_variables: [TRT01P, AVAL, CNSR]
    methods: [M-KM-PROB]
    sap_ref: "§5.2"
    reference_documents: [SAP-0.1]
    layout:
      rows: "Timepoints 6, 12, 18, 24 months"
      columns: "TRT01P — probability, 95% CI"
    notes: "Greenwood 95% CI."

  - id: T-EFF-05
    kind: table
    title: "Objective Response Rate (BICR)"
    analysis_set: RESPEVAL
    source_datasets: [ADRS, ADSL]
    parameter_codes: [CBOR]
    key_variables: [TRT01P, AVALC, ORRFL, STRAT2, STRAT3]
    methods: [M-CMH-STRAT, M-CLOPPER, M-WILSON]
    sap_ref: "§5.3"
    reference_documents: [SAP-0.1]
    layout:
      rows: "N, n responders, ORR % (95% CI), risk difference (95% CI), CMH p; best response breakdown (CR/PR/SD/PD/NE)"
      columns: "TRT01P"
    notes: "Clopper-Pearson 95% CI primary; Wilson as sensitivity row. Subjects with no post-baseline assessment counted as non-responders (§4.3)."

  - id: T-EFF-06
    kind: table
    title: "Disease Control Rate"
    analysis_set: RESPEVAL
    source_datasets: [ADRS, ADSL]
    parameter_codes: [CBDCR]
    key_variables: [TRT01P, AVALC, DCRFL, STRAT2, STRAT3]
    methods: [M-CMH-STRAT, M-CLOPPER]
    sap_ref: "§5.3"
    reference_documents: [SAP-0.1]
    layout:
      rows: "Same as T-EFF-05"
      columns: "TRT01P"
    notes: "Uses DCRFL. SD requires duration ≥8 weeks from randomisation."

  - id: T-EFF-07
    kind: table
    title: "Duration of Response"
    analysis_set: RESPONDERS
    source_datasets: [ADTTE]
    parameter_codes: [DOR]
    key_variables: [TRT01P, AVAL, CNSR]
    methods: [M-KM-MEDIAN, M-KM-PROB]
    sap_ref: "§5.4"
    reference_documents: [SAP-0.1]
    layout:
      rows: "Median DoR (95% CI); proportion with DoR ≥6 mo, ≥12 mo"
      columns: "TRT01P"
    notes: "No formal between-arm test (hypothesis-generating)."

  # ===== Efficacy — sensitivity =====

  - id: T-EFF-08
    kind: table
    title: "OS in Per-Protocol Population (Sensitivity)"
